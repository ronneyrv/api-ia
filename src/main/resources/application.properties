spring.application.name=budgeting

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.ai.openai.api-key=${OPENAI_API_KEY}

spring.ai.model.audio.transcription=openai
spring.ai.openai.audio.transcription.options.model=whisper-1
spring.ai.openai.audio.transcription.options.language=pt
spring.ai.openai.audio.transcription.options.temperature=0
spring.ai.openai.audio.transcription.options.response-format=text
spring.ai.openai.audio.transcription.options.prompt=Áudio em portugês brasileiro. Áudio contém descrição de gastos financeiros. As frases geralmente contêm: - um valor em reais (número + "reais"); - uma ação (gastei, paguei, comprei); - um local ou estabelecimento (mercado, farmácia, restaurante).

logging.level.org.springframework.ai=DEBUG

springdoc.swagger-ui.path=/swagger